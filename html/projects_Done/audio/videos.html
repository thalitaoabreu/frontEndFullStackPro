<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos</title>
</head>
<body>
    
<h2>Trabalhando com Vídeos</h2>

<!-- Aqui temos > Capa > Largura > Altura > Controles > Loop > Iniciar Mutado-->
<video poster="thumb.png" width="420" height="340" controls loop muted>

<!-- Aqui temos > Caminho do Vídeo > Tipo do Vídeo-->
    <source src="natureza.mp4" type="video/mp4">
</video>

<h2>Trabalhando com Audios</h2>

<audio controls loop muted>
    <source src="curso.mp3" type="audio/mpeg">
</audio>

</body>
</html>
